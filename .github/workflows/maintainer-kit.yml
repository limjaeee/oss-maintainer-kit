name: Maintainer Kit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-review-prompt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate PR review prompt
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          node src/cli.js pr-review --diff pr.diff --repo "${{ github.repository }}" --json
