name: Maintainer Kit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-review-prompt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate PR review comment
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          CONFIG_ARG=""
          if [ -f ".maintainer-kit.yml" ]; then
            CONFIG_ARG="--config .maintainer-kit.yml"
          fi
          node src/cli.js pr-comment --diff pr.diff --repo "${{ github.repository }}" $CONFIG_ARG > pr-comment.md
      - name: Upsert PR review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("pr-comment.md", "utf8");
            const marker = "<!-- oss-maintainer-kit:pr-review -->";
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) => {
              return comment.user.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
